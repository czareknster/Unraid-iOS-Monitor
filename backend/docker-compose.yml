services:
  backend:
    build: .
    container_name: unraid-monitor-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /var/local/emhttp:/host/emhttp:ro
      - ./data:/data
    devices:
      - /dev/dri:/dev/dri
    cap_add:
      - PERFMON  # required by intel_gpu_top for perf_event_open on i915 PMU
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_TOKEN: ${APP_TOKEN}
      UNRAID_API_URL: ${UNRAID_API_URL:-http://localhost:3001/graphql}
      UNRAID_API_KEY: ${UNRAID_API_KEY}
      HOST_SYS: /host/sys
      HOST_PROC: /host/proc
      DATA_DIR: /data
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
