name: UnraidMonitor
options:
  bundleIdPrefix: com.cezarmac
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  UnraidMonitor:
    type: application
    platform: iOS
    sources:
      - path: UnraidMonitor
    info:
      path: UnraidMonitor/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleDisplayName: Unraid Monitor
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          # Dev only: allow HTTP to LAN IPs while testing without cloudflared.
          # Production cloudflared endpoint is HTTPS, so default ATS applies there.
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cezarmac.unraidmonitor
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: UnraidMonitor/Info.plist
        CODE_SIGN_ENTITLEMENTS: UnraidMonitor/UnraidMonitor.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
